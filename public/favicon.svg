<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
<!-- Carbon fiber pattern -->
<pattern id="carbonPattern" width="4" height="4" patternUnits="userSpaceOnUse">
<path d="M0 4 L4 0 M-1 1 L1 -1 M3 5 L5 3" stroke="#222" stroke-width="1" />
</pattern>
</defs>

<!-- Base Card -->
<rect x="15" y="25" width="70" height="50" rx="8" fill="#111" />

<!-- Texture Overlay -->
<rect x="15" y="25" width="70" height="50" rx="8" fill="url(#carbonPattern)" />

<!-- Gold Lock (Shackle and Body) -->
<path d="M42 45 L58 45 L58 58 L42 58 Z M45 45 V40 A5 5 0 0 1 55 40 V45"
      stroke="#fbbf24"
      stroke-width="2.5"
      fill="none"
      stroke-linejoin="round" />
</svg>